# copilot-ghost configuration
# This file is read by copilot-wrapper.sh on every invocation.
# Edit values here or use the subcommands:
#   __ --set-model <model-id>   change the default model
#   __ --set-ttl <days>         change the session lifetime in days

# Default model used when no model is given as the first argument.
# Supported values: claude-opus-4.8, claude-opus-4.7, claude-opus-4.6, claude-opus-4.5,
#                   claude-sonnet-4.6, claude-sonnet-4.5, claude-haiku-4.5,
#                   gpt-5.5, gpt-5.4, gpt-5.3-codex, gpt-5.4-mini, gpt-5-mini,
#                   gemini-3.1-pro-preview, gemini-3.5-flash
DEFAULT_MODEL=gpt-5-mini

# Number of days a one-off session is preserved before a new one starts automatically.
# Set to 0 to always start a fresh session.
SESSION_LIFETIME_DAYS=7
